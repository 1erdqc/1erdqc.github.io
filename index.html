<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutfak Radyo</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }

        /* Dev Beyaz Saat */
        #clock {
            position: absolute; top: 30px; left: 40px;
            font-size: 65px; color: #fff; font-weight: bold;
        }

        /* Dev Mutfak Yazıları */
        #kitchen-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 95%; text-align: center;
            font-size: 70px; color: #ffffff; font-weight: bold;
        }

        /* Sağ Menü */
        #side-panel {
            position: fixed; right: -280px; top: 50%;
            transform: translateY(-50%); width: 280px;
            background: #1a1a1a; border: 2px solid #444;
            transition: 0.4s; z-index: 999; padding: 15px;
            border-radius: 20px 0 0 20px;
        }
        #side-panel.open { right: 0; }
        #handle {
            position: absolute; left: -60px; top: 0; width: 60px; height: 60px;
            background: #e30a17; color: #fff; text-align: center;
            line-height: 60px; font-size: 30px; cursor: pointer; border-radius: 15px 0 0 15px;
        }

        /* Durum Kayıtları */
        #log-screen {
            width: 100%; height: 100px; background: #000;
            font-size: 12px; color: #0f0; margin-top: 10px;
            border: 1px solid #333; overflow-y: auto; padding: 5px;
        }

        select, button { width: 100%; padding: 18px; margin: 8px 0; font-size: 20px; border-radius: 10px; }
        .btn-play { background: #e30a17; color: #fff; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="clock">00:00:00</div>
<div id="kitchen-text">MUTFAKTA BEREKET OLSUN</div>

<div id="side-panel">
    <div id="handle" onclick="document.getElementById('side-panel').classList.toggle('open')">⚙</div>
    <h3 style="margin:0">RADYOLAR</h3>

    <select id="station">
        <option value="http://yayin.damarfm.com:8080/;stream.mp3">DAMAR FM</option>
        <option value="http://kralwms.radyotvonline.net:80/kralfm">KRAL FM</option>
        <option value="http://46.20.3.201/stream/1">KRAL POP</option>
        <option value="http://46.20.7.126/stream/1">SLOW TÜRK</option>
        <option value="http://radyo.trt.net.tr/proxy/stream/12">TRT HABER</option>
    </select>

    <button class="btn-play" onclick="play()">OYNAT</button>
    <button onclick="stop()">DURDUR</button>

    <div id="log-screen">Sistem hazır.</div>
</div>

<script>
    // SAAT
    function tick() {
        var d = new Date();
        document.getElementById("clock").innerText = d.toLocaleTimeString();
    }
    setInterval(tick, 1000); tick();

    // YAZILAR
    var kitchenMessages = ["AFİYET OLSUN!", "ELLERİNE SAĞLIK!", "MUTFAK NEŞESİ", "ÇAYIN TADI BAŞKA", "GÜNÜNÜZ GÜZEL OLSUN"];
    var mIdx = 0;
    setInterval(function() {
        mIdx = (mIdx + 1) % kitchenMessages.length;
        document.getElementById("kitchen-text").innerText = kitchenMessages[mIdx];
    }, 12000);

    // RADYO MOTORU
    var audio = new Audio();
    var logBox = document.getElementById("log-screen");

    function print(txt) {
        var time = new Date().toLocaleTimeString().split(' ')[0];
        logBox.innerHTML += "<div>["+time+"] "+txt+"</div>";
        logBox.scrollTop = logBox.scrollHeight;
    }

    function play() {
        var url = document.getElementById("station").value;
        print("Bağlanıyor: " + url);

        audio.pause();
        audio.src = url;
        audio.load();

        // Android 4.4 için play sözü (promise) kontrolü
        var start = audio.play();
        if (start !== undefined) {
            start.then(function() {
                print("OYNATILIYOR...");
            }).catch(function(e) {
                print("ENGEL: " + e.name);
                print("Çözüm: Bu dosyayı telefona indirip öyle açın.");
            });
        }
    }

    function stop() {
        audio.pause();
        audio.src = "";
        print("Durduruldu.");
    }

    audio.onerror = function() { print("HATA: Yayın formatı uyumsuz."); };
</script>

</body>
</html>
