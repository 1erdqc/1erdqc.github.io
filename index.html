<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nest Hub Pro - 9.6" Optimized</title>

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        :root {
            --md-text: #FFFFFF;
            --md-text-secondary: rgba(255, 255, 255, 0.75);
            --card-bg: rgba(30, 31, 34, 0.98);
            --google-blue: #8AB4F8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; scroll-snap-type: y mandatory; overflow-y: scroll; }
        html::-webkit-scrollbar { display: none; }

        body {
            background: #000; color: var(--md-text);
            font-family: "Google Sans", sans-serif;
            width: 100vw; margin: 0;
            overflow-x: hidden;
        }

        /* ARKA PLAN VE KARARTMA */
        #bg-image {
            position: fixed; inset: 0;
            background-size: cover; background-position: center;
            z-index: -2; transition: background-image 2s ease-in-out;
            transform: scale(1.1);
        }
        .gradient-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.55); /* Karartma seviyesi artırıldı */
            z-index: -1;
        }

        section { min-height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; flex-direction: column; }

        /* HUB ANA EKRAN */
        .hub-section { padding: 5vh 6vw; justify-content: space-between; }

        /* ÜST BAR */
        .top-container { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; }
        .left-status { display: flex; align-items: center; gap: 25px; }
        .status-group { display: flex; align-items: center; gap: 10px; font-size: 1.8rem; font-weight: 500; }
        .status-group .material-icons-round { font-size: 2.5rem !important; }

        .system-specs {
            display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
            background: rgba(0,0,0,0.4); padding: 20px; border-radius: 28px;
            backdrop-filter: blur(10px);
        }
        .spec-item { display: flex; align-items: center; gap: 12px; font-size: 1.1rem; color: var(--md-text-secondary); }
        .spec-item span.material-icons-round { font-size: 1.6rem !important; }

        /* SAAT BÖLÜMÜ */
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .time-container { display: flex; align-items: baseline; }
        .time-text { font-size: 26vw; font-weight: 400; line-height: 0.8; letter-spacing: -12px; }
        .seconds-container { display: flex; align-items: baseline; color: var(--md-text-secondary); }
        .seconds-sep { font-size: 10vw; margin: 0 5px; font-weight: 300; }
        .seconds-text { font-size: 8vw; font-weight: 300; width: 11vw; }
        .date-text { font-size: 3.5rem; color: var(--md-text-secondary); margin-top: 2vh; }

        /* SAĞ ALT HAVA DURUMU */
        .bottom-bar { display: flex; justify-content: flex-end; align-items: center; width: 100%; padding-bottom: 2vh; }
        .weather-widget { display: flex; align-items: center; gap: 15px; font-size: 3rem; font-weight: 500; }

        /* HABERLER */
        .discover-section { background: #000; padding: 8vh 6vw; height: auto; min-height: 100vh; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 40px; margin-top: 40px; }
        .news-link { text-decoration: none; color: inherit; display: block; height: 100%; transition: 0.2s; }
        .news-card { background: var(--card-bg); border-radius: 40px; overflow: hidden; height: 100%; }
        .news-card img { width: 100%; height: 260px; object-fit: cover; opacity: 0.9; }
        .news-content { padding: 30px; }
        .news-title { font-size: 1.6rem; line-height: 1.4; font-weight: 500; }

        @media (orientation: portrait) {
            .time-text { font-size: 32vw; }
            .news-grid { grid-template-columns: 1fr; }
            .date-text { font-size: 3rem; }
        }
    </style>
</head>
<body>

<div id="bg-image"></div>
<div class="gradient-overlay"></div>

<section class="hub-section">
    <div class="top-container">
        <div class="left-status">
            <div class="status-group"><span class="material-icons-round">wifi</span></div>
            <div class="status-group">
                <span id="batLevel">--%</span>
                <span class="material-icons-round">battery_full</span>
            </div>
        </div>

        <div class="system-specs">
            <div class="spec-item"><span id="osInfo">Sistem</span><span class="material-icons-round">settings_cell</span></div>
            <div class="spec-item"><span id="browserInfo">Tarayıcı</span><span class="material-icons-round">language</span></div>
            <div class="spec-item"><span id="cpuInfo">--</span><span class="material-icons-round">memory</span></div>
            <div class="spec-item"><span id="resInfo">0x0</span><span class="material-icons-round">aspect_ratio</span></div>
            <div class="spec-item"><span id="connectionType">Durum</span><span class="material-icons-round">sensors</span></div>
        </div>
    </div>

    <div class="main-content">
        <div class="time-container">
            <div class="time-text" id="dClock">00:00</div>
            <div class="seconds-container">
                <span class="seconds-sep">:</span>
                <span class="seconds-text" id="dSeconds">00</span>
            </div>
        </div>
        <div class="date-text" id="dDate">-- --- ----</div>
    </div>

    <div class="bottom-bar">
        <div class="weather-widget">
            <span id="wTemp">22°</span>
            <span class="material-icons-round" style="color: #FFCE44; font-size: 4.5rem !important;">wb_sunny</span>
        </div>
    </div>
</section>

<section class="discover-section">
    <h2 style="font-size: 3rem; display: flex; align-items: center; gap: 20px;">
        <span class="material-icons-round" style="color:var(--google-blue); font-size: 4rem;">explore</span>
        Gündem
    </h2>
    <div class="news-grid" id="newsGrid"></div>
</section>

<script>
    // OS Bilgisi Düzeltildi
    function getSystemInfo() {
        const ua = navigator.userAgent;
        let os = "OS";

        // Daha kapsamlı OS taraması
        if (ua.match(/Android/i)) os = "Android";
        else if (ua.match(/iPhone|iPad|iPod/i)) os = "iOS";
        else if (ua.match(/Windows/i)) os = "Windows";
        else if (ua.match(/Macintosh/i)) os = "macOS";
        else if (ua.match(/Linux/i)) os = "Linux";

        let browser = "Web";
        if (ua.match(/Chrome/i)) browser = "Chrome";
        else if (ua.match(/Firefox/i)) browser = "Firefox";
        else if (ua.match(/Safari/i) && !ua.match(/Chrome/i)) browser = "Safari";

        document.getElementById('osInfo').textContent = os;
        document.getElementById('browserInfo').textContent = browser;
        document.getElementById('cpuInfo').textContent = (navigator.hardwareConcurrency || "4") + " Çekirdek";
        document.getElementById('resInfo').textContent = window.innerWidth + "x" + window.innerHeight;
        document.getElementById('connectionType').textContent = navigator.onLine ? "Çevrimiçi" : "Çevrimdışı";
    }

    function changeBackground() {
        // Yüksek çözünürlüklü manzara
        const bgUrl = `https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&w=1920&q=80&sig=${Math.random()}`;
        document.getElementById('bg-image').style.backgroundImage = `url('${bgUrl}')`;
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('dClock').textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        document.getElementById('dSeconds').textContent = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('dDate').textContent = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', weekday: 'long' });
    }

    async function fetchNews() {
        try {
            const rssUrl = encodeURIComponent('https://www.sozcu.com.tr/rss/son-dakika.xml');
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
            const data = await res.json();
            const grid = document.getElementById('newsGrid');
            if(data.status === 'ok') {
                grid.innerHTML = '';
                data.items.forEach(item => {
                    const img = item.enclosure.link || item.thumbnail || "https://via.placeholder.com/800x450/202124/FFFFFF?text=Haber+Gorseli";
                    grid.innerHTML += `
                        <a href="${item.link}" target="_blank" class="news-link">
                            <div class="news-card">
                                <img src="${img}" alt="news">
                                <div class="news-content">
                                    <div style="color:#FBBC04; font-size:1.2rem; margin-bottom:12px; font-weight:500;">SÖZCÜ</div>
                                    <div class="news-title">${item.title}</div>
                                </div>
                            </div>
                        </a>`;
                });
            }
        } catch (e) { console.error("Haber hatası"); }
    }

    function initBattery() {
        if(navigator.getBattery) {
            navigator.getBattery().then(bat => {
                const u = () => document.getElementById('batLevel').textContent = Math.floor(bat.level * 100) + "%";
                u(); bat.onlevelchange = u;
            });
        }
    }

    getSystemInfo();
    changeBackground();
    updateClock();
    fetchNews();
    initBattery();
    setInterval(updateClock, 1000);
    setInterval(changeBackground, 1800000);
    setInterval(fetchNews, 600000);
    window.addEventListener('resize', getSystemInfo);
</script>
</body>
</html>
