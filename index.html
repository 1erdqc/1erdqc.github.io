<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Sayfası | Material You</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        :root {
            /* Material You Renk Paleti (M3) */
            --md-sys-color-surface: #fef7ff;
            --md-sys-color-on-surface: #1d1b20;
            --md-sys-color-primary-container: #eaddff;
            --md-sys-color-on-primary-container: #21005d;
            --md-sys-color-outline: #79747e;
            --md-sys-color-secondary: #625b71;
            --background-image: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809'); /* Arka plan görseli */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: var(--background-image) no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Overlay (Arka planı hafif karartmak için) */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            z-index: -1;
        }

        /* Profil Kartı */
        .profile-card {
            background-color: rgba(254, 247, 255, 0.85); /* Hafif şeffaf yüzey */
            width: 90%;
            max-width: 400px;
            border-radius: 28px; /* M3 Büyük köşe yarıçapı */
            padding: 32px;
            text-align: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Profil Resmi */
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            margin-bottom: 16px;
            object-fit: cover;
            border: 3px solid var(--md-sys-color-primary-container);
        }

        h1 {
            color: var(--md-sys-color-on-surface);
            font-size: 24px;
            margin: 8px 0;
            font-weight: 500;
        }

        p {
            color: var(--md-sys-color-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Sosyal Linkler / Butonlar */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            text-decoration: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .link-item:hover {
            transform: scale(1.02);
            background-color: #d1bcff;
        }

        .link-item i {
            font-size: 20px;
        }

        /* Alt Kısım (Badge/Rozetler) */
        .badges {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .badge {
            background: rgba(0, 0, 0, 0.05);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--md-sys-color-on-surface);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="https://ui-avatars.com/api/?name=Kullanici&background=6750A4&color=fff&size=128" alt="Avatar" class="avatar">
        
        <h1>@kullaniciadi</h1>
        <p>Dijital Tasarımcı & Geliştirici</p>

        <div class="links-container">
            <a href="#" class="link-item">
                <span class="material-symbols-rounded">language</span>
                Web Sitem
            </a>
            <a href="#" class="link-item">
                <span class="material-symbols-rounded">chat</span>
                Discord
            </a>
            <a href="#" class="link-item">
                <span class="material-symbols-rounded">mail</span>
                E-posta
            </a>
        </div>

        <div class="badges">
            <span class="badge">Verified</span>
            <span class="badge">Developer</span>
        </div>
    </div>

</body>
</html>
